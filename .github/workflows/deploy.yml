name: Deploy SmartKampung to ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION:       ap-southeast-1
  ECR_REPOSITORY:   smartkampung-app
  ECS_CLUSTER:      smartkampung-cluster
  ECS_SERVICE:      smartkampung-task-service-a8i6ge6n
  CONTAINER_NAME:   smartkampung-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download and clean task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition smartkampung-task \
            --query taskDefinition > task-definition-raw.json
          
          cat task-definition-raw.json | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          keys_to_remove = ['taskDefinitionArn','revision','status','requiresAttributes',
                            'compatibilities','registeredAt','registeredBy','enableFaultInjection']
          for k in keys_to_remove:
              td.pop(k, None)
          print(json.dumps(td))
          " > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json