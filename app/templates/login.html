{% extends 'base.html' %}
{% block title %}Login — SmartKampung{% endblock %}
{% block content %}
<div style="max-width:420px;margin:3rem auto;">
  <div class="card">
    <h2 style="text-align:center;">🔐 Login</h2>
    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="contoh@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Masuk</button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:0.88rem;color:var(--muted);">
      Belum punya akun? <a href="{{ url_for('auth.register') }}" style="color:var(--blue-light);font-weight:600;">Daftar</a>
    </p>
  </div>
</div>
{% endblock %}
