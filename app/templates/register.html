{% extends 'base.html' %}
{% block title %}Daftar — SmartKampung{% endblock %}
{% block content %}
<div style="max-width:460px;margin:3rem auto;">
  <div class="card">
    <h2 style="text-align:center;">📝 Buat Akun</h2>
    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" name="nama" placeholder="Nama sesuai KTP" required>
      </div>
      <div class="form-group">
        <label>NIK</label>
        <input type="text" name="nik" placeholder="16 digit NIK" maxlength="16" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="contoh@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min. 8 karakter" required>
      </div>
      <div class="form-group">
        <label>Daftar sebagai</label>
        <select name="role">
          <option value="masyarakat">Masyarakat</option>
          <option value="admin">Admin Kelurahan</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Daftar Sekarang</button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:0.88rem;color:var(--muted);">
      Sudah punya akun? <a href="{{ url_for('auth.login') }}" style="color:var(--blue-light);font-weight:600;">Login</a>
    </p>
  </div>
</div>
{% endblock %}
